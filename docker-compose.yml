name: mainyuk-stack

services:
  backend:
    container_name: mainyuk-backend
    build:
      context: ./back-end
      dockerfile: dockerfile
    restart: always
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DB_HOST: ${DB_HOST_DOCKER:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/uploads}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
    volumes:
      - ./dev-storage/uploads:/app/uploads

  frontend:
    container_name: mainyuk-frontend
    build:
      context: ./front-end
      dockerfile: dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"